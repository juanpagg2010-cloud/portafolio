      <stop offset="0.48" stop-color="#4a3b1c" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#07090d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border" x1="40" y1="34" x2="220" y2="222" gradientUnits="userSpaceOnUse">
